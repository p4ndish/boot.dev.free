services:
  postgres:
    image: postgres:16-alpine
    container_name: bootdev-clone-db
    environment:
      POSTGRES_DB: bootdev_clone
      POSTGRES_USER: bootdev
      POSTGRES_PASSWORD: bootdev
    ports:
      - "5433:5432"
    volumes:
      - bootdev_pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bootdev -d bootdev_clone"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bootdev-clone-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://bootdev:bootdev@postgres:5432/bootdev_clone?sslmode=disable"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  bootdev_pgdata:
